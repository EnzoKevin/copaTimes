<!-- dashboard.component.html -->
<app-top-navbar></app-top-navbar>

<div class="flex min-h-[calc(100vh-4rem)]">
  <app-sidebar></app-sidebar>

  <!-- Main Canvas -->
  <main class="flex-1 md:ml-64 p-margin-mobile md:p-margin-desktop overflow-x-hidden">
    <!-- Hero Banner -->
    <section
      class="relative w-full h-48 md:h-64 rounded-xl overflow-hidden mb-lg stadium-gradient shadow-lg"
    >
      <div class="relative z-10 h-full flex flex-col justify-center px-lg text-white">
        <h1 class="font-display-lg text-display-lg mb-xs">Tournament Control</h1>
        <p class="font-body-lg text-body-lg max-w-lg opacity-90">
          Manage the road to glory. Monitor team qualifications, group balances, and administrative
          schedules in real-time.
        </p>
      </div>
    </section>

    <!-- Bento Statistics Panel -->
    <app-bento-stats></app-bento-stats>

    <!-- Split Content View -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-gutter">
      <!-- Left Column: Teams -->
      <div class="lg:col-span-2">
        <div class="flex justify-between items-center mb-md">
          <h2 class="font-headline-md text-headline-md text-on-surface">Recently Added Teams</h2>
          <button class="text-primary font-bold hover:underline text-label-md">
            View All Teams
          </button>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-md">
          <!-- Loop Dinâmico de Seleções -->
          <app-team-card *ngFor="let team; data: of; recentTeams" [team]="team"></app-team-card>

          <!-- Placeholder para Criar Nova Seleção -->
          <div
            class="glass-card rounded-xl p-md flex flex-col gap-md border-dashed border-2 border-outline justify-center items-center text-on-surface-variant cursor-pointer active:scale-95 transition-all duration-200 hover:shadow-md hover:-translate-y-0.5"
          >
            <span class="material-symbols-outlined text-display-lg">add_circle</span>
            <span class="font-bold text-label-md">Register New Team</span>
          </div>
        </div>
      </div>

      <!-- Right Column: Standings & Widgets -->
      <div class="lg:col-span-1">
        <div class="flex justify-between items-center mb-md">
          <h2 class="font-headline-md text-headline-md text-on-surface">Group A</h2>
          <div class="flex gap-xs">
            <button
              class="w-8 h-8 rounded-full bg-surface-container hover:bg-surface-container-high flex items-center justify-center transition-colors"
            >
              <span class="material-symbols-outlined text-sm">chevron_left</span>
            </button>
            <button
              class="w-8 h-8 rounded-full bg-surface-container hover:bg-surface-container-high flex items-center justify-center transition-colors"
            >
              <span class="material-symbols-outlined text-sm">chevron_right</span>
            </button>
          </div>
        </div>

        <app-group-standings></app-group-standings>
        <app-upcoming-match></app-upcoming-match>
      </div>
    </div>

    <!-- Footer -->
    <footer
      class="mt-xl pt-lg border-t border-outline-variant flex flex-col md:flex-row justify-between items-center gap-md"
    >
      <p class="font-label-md text-label-md text-on-surface-variant opacity-60">
        © 2026 World Cup Manager - International Tournament Division
      </p>
      <div class="flex gap-md">
        <a
          class="text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md"
          href="#"
          >Privacy Policy</a
        >
        <a
          class="text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md"
          href="#"
          >Admin Logs</a
        >
        <a
          class="text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md"
          href="#"
          >API Status</a
        >
      </div>
    </footer>
  </main>
</div>

<!-- Mobile Tab Bar -->
<app-mobile-navbar></app-mobile-navbar>
